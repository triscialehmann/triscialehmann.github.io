<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f9f9f9;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #1a1a1a;
    overflow: hidden;
  }

  /* ── Pixel grid background (subtle) ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size: 16px 16px;
    pointer-events: none;
  }

  .container {
    text-align: center;
    padding: 40px 20px;
    max-width: 700px;
    width: 100%;
  }

  /* ── ERROR CODE ── */
  .error-code {
    font-size: 11px;
    color: #888;
    letter-spacing: 2px;
    margin-bottom: 32px;
  }

  /* ── DINO ── */
  .dino-wrap {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 0;
    margin-bottom: 0;
    position: relative;
  }

  /* ── GROUND LINE ── */
  .ground {
    width: 600px;
    max-width: 90vw;
    height: 2px;
    background: #1a1a1a;
    margin: 0 auto 36px;
    position: relative;
  }

  /* running pixel blocks on ground */
  .ground::before,
  .ground::after {
    content: '';
    position: absolute;
    bottom: 4px;
    width: 20px;
    height: 8px;
    background: #1a1a1a;
  }
  .ground::before { left: 60px; }
  .ground::after  { right: 80px; width: 12px; height: 6px; bottom: 4px; }

  /* ── HEADING ── */
  h1 {
    font-size: clamp(12px, 3vw, 18px);
    line-height: 1.8;
    margin-bottom: 20px;
    color: #1a1a1a;
  }

  /* ── SUBTEXT ── */
  .sub {
    font-size: clamp(7px, 1.8vw, 9px);
    color: #888;
    line-height: 2.2;
    margin-bottom: 40px;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    width: 300px;
    margin: 0 auto 36px;
  }
  .progress-label {
    font-size: 7px;
    color: #aaa;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }
  .progress-bar {
    width: 100%;
    height: 12px;
    border: 2px solid #1a1a1a;
    background: #f0f0f0;
    position: relative;
    image-rendering: pixelated;
  }
  .progress-fill {
    height: 100%;
    background: repeating-linear-gradient(
      90deg,
      #1a1a1a 0px, #1a1a1a 8px,
      #555 8px, #555 10px
    );
    animation: fillBar 3s steps(20, end) forwards;
    width: 0%;
  }
  @keyframes fillBar {
    0%  { width: 0%; }
    60% { width: 68%; }
    100%{ width: 68%; }
  }
  .progress-pct {
    font-size: 7px;
    color: #888;
    margin-top: 8px;
    animation: countUp 3s steps(68, end) forwards;
  }
  @keyframes countUp {
    0%   { content: '0%'; }
    100% { content: '68%'; }
  }

  /* ── BLINK CURSOR ── */
  .blink {
    display: inline-block;
    animation: blink 1s step-end infinite;
    color: #1a1a1a;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── CACTUS obstacles ── */
  .obstacles {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 24px;
    margin-top: 0;
    position: relative;
  }

  /* pixel cactus */
  .cactus {
    display: grid;
    grid-template-columns: repeat(5, 6px);
    grid-template-rows: repeat(8, 6px);
    image-rendering: pixelated;
  }
  .cactus .p { background: #1a1a1a; }
  .cactus .e { background: transparent; }

  /* ── TAGS ── */
  .tags {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 32px;
  }
  .tag {
    font-size: 6px;
    border: 2px solid #1a1a1a;
    padding: 5px 10px;
    color: #1a1a1a;
    letter-spacing: 1px;
  }

  /* ── DINO WALK ANIMATION ── */
  .dino-svg {
    animation: dinoWalk 0.5s ease-in-out infinite alternate;
    image-rendering: pixelated;
    width: 120px;
    height: 120px;
    object-fit: contain;
  }
  @keyframes dinoWalk {
    0%   { transform: translateY(0px); }
    100% { transform: translateY(-6px); }
  }

  /* ── OBSTACLE FLOAT ── */
  .cloud {
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    animation: cloudDrift 12s linear infinite;
  }
  @keyframes cloudDrift {
    from { left: 110%; }
    to   { left: -20%; }
  }

  .cloud-block {
    background: #ccc;
    image-rendering: pixelated;
  }
</style>
</head>
